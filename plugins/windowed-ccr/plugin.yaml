name: headroom-windowed-ccr
version: "0.1.0"
description: "Windowed CCR for logs / structured-text — the companion to headroom-json-compress. Compresses big LOG/terminal/text tool results to a compact view + a hash= retrieval marker via Headroom's UniversalCompressor (content_type=LOG, ccr_enabled), stores the original in Headroom's compression store, and registers a retrieve_window tool so the model can pull back a PARTIAL extract (grep / line-range / head / tail) instead of the whole original. Implements the RUN 4 finding (3-run mean, Opus): 90% accuracy, -34% input tokens vs raw, ~27% cheaper, 0 fallback dumps — reversing RUN 2's full-original token-tax inversion. Per-tool two-list control: WINDOWED_CCR_TOOLS compresses+marks, WINDOWED_CCR_SHADOW_TOOLS monitors (logs would-compress decisions without replacing), shadow wins on overlap, a tool on neither list is out of scope. Verifies store round-trip BEFORE replacing the result (refuses to mint a marker it can't recover). retrieve_window fails SOFT: a missing/expired hash returns a 're-run the tool' message, never an error or fabricated answer. Hard caps: 40 lines/retrieve, +/-5 context, bounded 30-line fallback on a pattern miss (never the whole blob). OFF by default — master kill-switch HERMES_WINDOWED_CCR gates the compress hook; both tool lists empty by default; log path only (NOT web_extract — prose emits no usable marker). Requires headroom-ai==0.26.0."
hooks:
  - transform_tool_result
